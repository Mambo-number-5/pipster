services:
  redis:
    # Cambiamo l'immagine per includere i moduli RedisJSON e RedisSearch
    image: redis/redis-stack-server:latest
    container_name: pipster_redis
    #command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
      - "8001:8001" # OPZIONALE: apre la dashboard grafica di RedisInsight
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck: # Aggiunta: controlla se Redis è davvero pronto
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  bot:
    build: .
    image: pipster
    container_name: pipster_bot
    depends_on:
      redis:
        condition: service_healthy # Il bot parte solo quando il ping di redis risponde
    volumes:
      - .:/app
      - ./historical_data:/app/historical_data
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PYDEVD_DISABLE_FILE_VALIDATION=1  # Toglie il warning del debugger
      - PYTHONUNBUFFERED=1                # Log in tempo reale, vedi i print mano a mano che compaiono
    
    # Comando standard: avvia il bot normalmente
    command: python main.py
    restart: unless-stopped

volumes:
  redis_data: